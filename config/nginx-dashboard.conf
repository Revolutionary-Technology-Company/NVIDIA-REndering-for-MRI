# Revolutionary Technology Company - Hospital IT Security Router Module
# Secure Nginx wrapper deployment hosting the RTX 6000 Pipeline Dashboard on port 9920.

server {
    listen 9920 default_server;
    listen [::]:9920 default_server;
    server_name _;

    # Root workspace directory mapping to the pipeline folder
    root /workspace/pipeline;
    index dashboard.html;

    # --------------------------------------------------------------------------
    # CYBERSECURITY AUDIT HOOKS (Hospital Intranet IP Access Lists)
    # Adjust these CIDR blocks to perfectly match your physical VLAN architecture.
    # --------------------------------------------------------------------------
    allow 10.0.0.0/8;       # Allow internal hospital-wide system subnets
    allow 127.0.0.1;        # Allow local host loopback interface diagnostics
    deny all;               # Drop all external and unknown wide-area network queries

    # --------------------------------------------------------------------------
    # HARDENED SECURITY HEADERS (HIPAA and Network Compliance)
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Operational Logs path tracking
    access_log /var/log/nginx/mri_dashboard_access.log;
    error_log /var/log/nginx/mri_dashboard_error.log warn;

    # Dashboard serving allocation zone
    location / {
        try_files $uri $uri/ /dashboard.html =404;
        
        # Turn off internal Nginx tracking cache parameters so updates are truly instantaneous
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # Block access to raw database registries or logic scripts via this port
    location ~* \.(json|py|sh|lua|yml)$ {
        deny all;
        return 403;
    }
}
